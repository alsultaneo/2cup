name: Build Windows executable

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build 2cup.exe (no console window)
        run: go build -ldflags "-H=windowsgui" -o 2cup.exe .

      - name: Stage release folder
        run: |
          mkdir dist
          copy 2cup.exe dist\2cup.exe
          if (Test-Path 2cup.png) { copy 2cup.png dist\2cup.png }
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: 2cup-windows
          path: dist/

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/2cup.exe
            dist/2cup.png
